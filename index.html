<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XÆRTH Translator Ω</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
color:lime;
font-family:monospace;
text-align:center;
}

/* NUBES PIXEL */
#clouds{
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/6RLKQkL.png");
background-size:cover;
animation:cloudMove 40s linear infinite;
z-index:-1;
}

@keyframes cloudMove{
from{background-position:0 0;}
to{background-position:-2000px 0;}
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input,select,button,textarea{
background:black;
color:lime;
border:1px solid lime;
padding:8px;
font-family:monospace;
}

button{cursor:pointer;margin-top:10px;}

#traductor{display:none;padding-top:60px;}

textarea{
width:90%;
height:120px;
}

/* MENU IDIOMAS */
#menuIdiomas{
position:fixed;
top:10px;
right:10px;
}

/* RESPONSIVE */
@media(min-width:700px){
textarea{width:60%;}
}

</style>
</head>

<body>

<div id="clouds"></div>

<!-- LOGIN -->
<div id="login">
<h1>BIENVENIDO A TRADUCTOR XAERTH</h1>
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<p id="error" style="color:red;"></p>
</div>

<!-- TRADUCTOR -->
<div id="traductor">

<div id="menuIdiomas">
<select id="idioma">
<option value="es">Español</option>
<option value="en">Inglés</option>
<option value="fr">Francés</option>
<option value="de">Alemán</option>
<option value="it">Italiano</option>
<option value="pt">Portugués</option>
<option value="jp">Japonés</option>
<option value="kr">Coreano</option>
<option value="ru">Ruso</option>
<option value="ar">Árabe</option>
<option value="cn">Chino</option>
<option value="xaerth">XÆRTH CODE Ω</option>
</select>
</div>

<h2>XÆRTH MULTI TRANSLATOR Ω</h2>

<textarea id="input" placeholder="Escribe aquí..."></textarea>
<br>

<button onclick="traducir()">TRADUCIR</button>

<p id="output"></p>

</div>

<script>

/* LOGIN */
function login(){
if(document.getElementById("pass").value==="8514"){
login.style.display="none";
traductor.style.display="block";
}else{
error.innerText="ACCESO DENEGADO";
}
}

/* ===== XAERTH CODE Ω ===== */

const mapCODE={
"A":"Ω-184-Σ","B":"Ω-302-Σ","C":"Ω-091-Σ","D":"Ω-455-Σ",
"E":"Ω-128-Σ","F":"Ω-772-Σ","G":"Ω-663-Σ","H":"Ω-019-Σ",
"I":"Ω-220-Σ","J":"Ω-531-Σ","K":"Ω-842-Σ","L":"Ω-107-Σ",
"M":"Ω-666-Σ","N":"Ω-350-Σ","O":"Ω-904-Σ",
"P":"Ω-777-Σ","Q":"Ω-120-Σ","R":"Ω-808-Σ",
"S":"Ω-909-Σ","T":"Ω-600-Σ","U":"Ω-411-Σ",
"V":"Ω-219-Σ","W":"Ω-005-Σ","X":"Ω-333-Σ",
"Y":"Ω-990-Σ","Z":"Ω-444-Σ"
};

const reverseCODE={};
for(let k in mapCODE){
reverseCODE[mapCODE[k]]=k;
}

/* DICCIONARIOS SIMPLES */
const diccionarios={
en:{HELLO:"HOLA",WORLD:"MUNDO"},
fr:{BONJOUR:"HOLA",MONDE:"MUNDO"},
de:{HALLO:"HOLA",WELT:"MUNDO"},
it:{CIAO:"HOLA",MONDO:"MUNDO"},
pt:{OLA:"HOLA",MUNDO:"MUNDO"},
jp:{"こんにちは":"HOLA"},
kr:{"안녕하세요":"HOLA"},
ru:{"ПРИВЕТ":"HOLA"},
ar:{"مرحبا":"HOLA"},
cn:{"你好":"HOLA"}
};

function traducir(){

let idioma=document.getElementById("idioma").value;
let texto=document.getElementById("input").value.toUpperCase().trim();
let resultado="";

/* XAERTH → ESPAÑOL */
if(texto.includes("Ω-")){
texto.split(" ").forEach(p=>{
resultado+=reverseCODE[p]?reverseCODE[p]:" ";
});
}

/* OTROS IDIOMAS → ESPAÑOL */
else if(diccionarios[idioma]){
texto.split(" ").forEach(w=>{
resultado+=diccionarios[idioma][w]?
diccionarios[idioma][w]+" ":w+" ";
});
}

/* ESPAÑOL → XAERTH */
else{
for(let letra of texto){
resultado+=mapCODE[letra]?
mapCODE[letra]+" ":letra+" ";
}
}

output.innerText=resultado.trim();

}

</script>

</body>
</html>
