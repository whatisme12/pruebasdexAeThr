"XAERTH"
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XAERTH TRANSLATOR</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
color:lime;
font-family:monospace;
text-align:center;
margin:0;
}

h1{margin-top:20px;}

textarea{
width:90%;
height:140px;
background:black;
color:lime;
border:2px solid lime;
font-size:18px;
padding:10px;
}

button{
margin:10px;
padding:10px 15px;
font-size:16px;
background:black;
color:lime;
border:2px solid lime;
cursor:pointer;
}

button:hover{
background:lime;
color:black;
}

.note{color:red;}
</style>
</head>

<body>

<h1>XAERTH SYSTEM</h1>

<p class="note">
Este traductor es nuevo, y todavía estamos trabajando para mejorarlo.
</p>

<textarea id="input" placeholder="Escribe aquí..."></textarea>
<br>

<button onclick="aXaerth()">Idioma → XAERTH</button>
<button onclick="aEspanol()">XAERTH → Idioma</button>

<p id="output"></p>

<script>

/* ======================
   ALFABETO XAERTH
====================== */

const abecedario={
"A":"⟁","B":"⌬","C":"◈","D":"⊘","E":"⌁",
"F":"⊗","G":"⌖","H":"⧉","I":"∆","J":"⌾",
"K":"⊙","L":"⌂","M":"◬","N":"⬡","Ñ":"⬢",
"O":"∅","P":"⟡","Q":"⟠","R":"⌘","S":"⧫",
"T":"⌭","U":"⊓","V":"⊜","W":"⌯","X":"✧",
"Y":"⌖⌁","Z":"⊛"
};

/* Crear diccionario inverso */
const inverso={};
Object.keys(abecedario).forEach(l=>{
inverso[abecedario[l]]=l;
});

/* ======================
   ESPAÑOL → XAERTH
====================== */

function aXaerth(){

let texto=document
.getElementById("input")
.value
.toUpperCase();

let resultado=[];

for(let letra of texto){

if(letra===" "){
resultado.push("   "); // mantiene palabras
}
else if(abecedario[letra]){
resultado.push(abecedario[letra]);
}
else{
resultado.push(letra);
}

}

document.getElementById("output").innerText=
resultado.join(" ");
}

/* ======================
   XAERTH → ESPAÑOL
====================== */

function aEspanol(){

let texto=document
.getElementById("input")
.value
.trim();

let simbolos=texto.split(/\s+/);

let resultado="";

simbolos.forEach(s=>{

if(inverso[s]){
resultado+=inverso[s];
}
else if(s===""){
resultado+=" ";
}
else{
resultado+=s;
}

});

document.getElementById("output").innerText=
resultado;
}

</script>

</body>
</html>
