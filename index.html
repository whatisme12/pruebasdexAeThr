<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traductor Xaerth</title>

<style>

/* ===== ESTILO GENERAL ===== */
body{
margin:0;
font-family:Arial;
color:white;
background:#000;
overflow:hidden;
}

/* ===== FONDO NUBES PIXEL ===== */
.clouds{
position:fixed;
width:200%;
height:100%;
background:
radial-gradient(circle,#fff 10px,transparent 11px),
radial-gradient(circle,#fff 15px,transparent 16px);
background-size:120px 120px;
animation:mover 40s linear infinite;
opacity:0.2;
}

@keyframes mover{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* ===== LOGIN ===== */
#login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

input{
padding:10px;
font-size:18px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ===== TRADUCTOR ===== */
#traductor{
display:none;
padding:20px;
text-align:center;
}

textarea{
width:90%;
height:120px;
margin:10px;
border-radius:10px;
padding:10px;
font-size:16px;
}

select{
position:absolute;
top:10px;
right:10px;
padding:8px;
border-radius:8px;
}

@media(max-width:600px){
textarea{
width:95%;
}
}

</style>
</head>

<body>

<div class="clouds"></div>

<!-- LOGIN -->
<div id="login">
<h1>BIENVENIDO A TRADUCTOR XAERTH</h1>
<p>Ingrese contraseña</p>

<input type="password" id="clave" placeholder="Contraseña">
<button onclick="entrar()">Entrar</button>

<p id="error"></p>
</div>

<!-- TRADUCTOR -->
<div id="traductor">

<select id="modo">
<option value="es_x">Español → Xaerth</option>
<option value="x_es">Xaerth → Español</option>
</select>

<h2>Traductor Xaerth</h2>

<textarea id="entrada" placeholder="Escribe aquí..."></textarea>

<br>

<button onclick="traducir()">Traducir</button>

<textarea id="salida" placeholder="Resultado..." readonly></textarea>

</div>

<script>

/* ===== PASSWORD ===== */
function entrar(){
let clave=document.getElementById("clave").value;

if(clave==="8514"){
document.getElementById("login").style.display="none";
document.getElementById("traductor").style.display="block";
document.body.style.overflow="auto";
}else{
document.getElementById("error").innerText="Contraseña incorrecta";
}
}

/* ===== IDIOMA XAERTH (NUEVO COMPLEJO) ===== */

const xaerth={
a:"∆", b:"ß", c:"¢", d:"Ð", e:"Ξ", f:"Ŧ",
g:"Ǥ", h:"Ħ", i:"Ī", j:"ʝ", k:"Ҡ", l:"Ł",
m:"₥", n:"И", ñ:"Й", o:"Ø", p:"Þ", q:"Ҩ",
r:"Я", s:"§", t:"Ŧ", u:"Ʉ", v:"V", w:"₩",
x:"Ж", y:"¥", z:"Ƶ"
};

/* inverso */
const español={};
for(let letra in xaerth){
español[xaerth[letra]]=letra;
}

/* ===== TRADUCCIÓN ===== */

function traducir(){

let texto=document.getElementById("entrada").value.toLowerCase();
let modo=document.getElementById("modo").value;

let resultado="";

if(modo==="es_x"){

for(let char of texto){
resultado+=xaerth[char] || char;
}

}else{

for(let char of texto){
resultado+=español[char] || char;
}

}

document.getElementById("salida").value=resultado;

}

</script>

</body>
</html>
